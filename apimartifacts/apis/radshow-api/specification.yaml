openapi: "3.0.1"
info:
  title: RAD Show API
  description: >-
    Unified API for RAD Showcase — Products CRUD, regional status,
    health checks, and DR failover operations.
  version: "1.0.0"
  contact:
    name: RAD Showcase Team

servers:
  - url: https://apim-radshow-{env}.azure-api.net/api

paths:
  /products:
    get:
      operationId: ListProducts
      summary: List all products
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: CreateProduct
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: GetProduct
      summary: Get a product by ID
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
    put:
      operationId: UpdateProduct
      summary: Update a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: DeleteProduct
      summary: Delete a product
      responses:
        "204":
          description: Product deleted

  /status:
    get:
      operationId: GetStatus
      summary: Get regional component status
      responses:
        "200":
          description: Component health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /healthz:
    get:
      operationId: HealthCheck
      summary: Health check endpoint
      responses:
        "200":
          description: Healthy
          content:
            text/plain:
              schema:
                type: string

  /failover:
    post:
      operationId: TriggerFailover
      summary: Trigger DR failover
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FailoverRequest"
      responses:
        "200":
          description: Failover initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailoverResponse"

  /failover/status:
    get:
      operationId: GetFailoverStatus
      summary: Get current failover status
      responses:
        "200":
          description: Failover state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailoverStatus"

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        category:
          type: string
        originRegion:
          type: string
        createdAt:
          type: string
          format: date-time
    ProductInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        category:
          type: string
    StatusResponse:
      type: object
      properties:
        region:
          type: string
        sqlMi:
          type: string
        redis:
          type: string
        storage:
          type: string
        keyVault:
          type: string
    FailoverRequest:
      type: object
      properties:
        targetRegion:
          type: string
    FailoverResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
    FailoverStatus:
      type: object
      properties:
        activeRegion:
          type: string
        state:
          type: string
        lastFailover:
          type: string
          format: date-time
