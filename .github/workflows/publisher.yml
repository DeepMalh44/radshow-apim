name: Publish APIM Configuration

on:
  push:
    branches:
      - main
    paths:
      - 'apimartifacts/**'
      - 'configuration.*.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - DEV01
          - STG01
          - PRD01

permissions:
  contents: read
  id-token: write

env:
  apiops_release_version: v6.0.2

jobs:
  publish-dev:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'DEV01')
    environment: DEV01
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Bearer Token
        id: token
        run: |
          TOKEN=$(az account get-access-token --resource https://management.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "bearer_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run Publisher
        env:
          AZURE_BEARER_TOKEN: ${{ steps.token.outputs.bearer_token }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
          API_MANAGEMENT_SERVICE_NAME: ${{ secrets.API_MANAGEMENT_SERVICE_NAME }}
          API_MANAGEMENT_SERVICE_OUTPUT_FOLDER_PATH: ${{ github.workspace }}/apimartifacts
          CONFIGURATION_YAML_PATH: ${{ github.workspace }}/configuration.dev.yaml
        run: |
          set -euo pipefail
          echo "Downloading publisher..."
          RELEASE_URL="https://github.com/Azure/apiops/releases/download/${{ env.apiops_release_version }}/publisher-linux-x64.zip"
          curl -sL "$RELEASE_URL" -o /tmp/publisher.zip
          unzip -oq /tmp/publisher.zip -d /tmp/publisher
          chmod +x /tmp/publisher/publisher
          echo "Running publisher..."
          /tmp/publisher/publisher

  publish-stg:
    needs: publish-dev
    if: |
      always() &&
      (needs.publish-dev.result == 'success' || needs.publish-dev.result == 'skipped') &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'STG01'))
    runs-on: ubuntu-latest
    environment: STG01
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Bearer Token
        id: token
        run: |
          TOKEN=$(az account get-access-token --resource https://management.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "bearer_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run Publisher
        env:
          AZURE_BEARER_TOKEN: ${{ steps.token.outputs.bearer_token }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
          API_MANAGEMENT_SERVICE_NAME: ${{ secrets.API_MANAGEMENT_SERVICE_NAME }}
          API_MANAGEMENT_SERVICE_OUTPUT_FOLDER_PATH: ${{ github.workspace }}/apimartifacts
          CONFIGURATION_YAML_PATH: ${{ github.workspace }}/configuration.stg.yaml
        run: |
          set -euo pipefail
          RELEASE_URL="https://github.com/Azure/apiops/releases/download/${{ env.apiops_release_version }}/publisher-linux-x64.zip"
          curl -sL "$RELEASE_URL" -o /tmp/publisher.zip
          unzip -oq /tmp/publisher.zip -d /tmp/publisher
          chmod +x /tmp/publisher/publisher
          /tmp/publisher/publisher

  publish-prd:
    needs: publish-stg
    if: |
      always() &&
      (needs.publish-stg.result == 'success' || needs.publish-stg.result == 'skipped') &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'PRD01'))
    runs-on: ubuntu-latest
    environment: PRD01
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Bearer Token
        id: token
        run: |
          TOKEN=$(az account get-access-token --resource https://management.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "bearer_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run Publisher
        env:
          AZURE_BEARER_TOKEN: ${{ steps.token.outputs.bearer_token }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
          API_MANAGEMENT_SERVICE_NAME: ${{ secrets.API_MANAGEMENT_SERVICE_NAME }}
          API_MANAGEMENT_SERVICE_OUTPUT_FOLDER_PATH: ${{ github.workspace }}/apimartifacts
          CONFIGURATION_YAML_PATH: ${{ github.workspace }}/configuration.prd.yaml
        run: |
          set -euo pipefail
          RELEASE_URL="https://github.com/Azure/apiops/releases/download/${{ env.apiops_release_version }}/publisher-linux-x64.zip"
          curl -sL "$RELEASE_URL" -o /tmp/publisher.zip
          unzip -oq /tmp/publisher.zip -d /tmp/publisher
          chmod +x /tmp/publisher/publisher
          /tmp/publisher/publisher
