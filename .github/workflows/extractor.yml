name: Extract APIM Configuration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Source environment to extract from'
        required: true
        type: choice
        options:
          - DEV01
          - STG01
          - PRD01

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  apiops_release_version: v6.0.2

jobs:
  extract:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Bearer Token
        id: token
        run: |
          TOKEN=$(az account get-access-token --resource https://management.azure.com/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "bearer_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run Extractor
        env:
          AZURE_BEARER_TOKEN: ${{ steps.token.outputs.bearer_token }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
          API_MANAGEMENT_SERVICE_NAME: ${{ secrets.API_MANAGEMENT_SERVICE_NAME }}
          API_MANAGEMENT_SERVICE_OUTPUT_FOLDER_PATH: ${{ github.workspace }}/apimartifacts
        run: |
          set -euo pipefail
          echo "Downloading extractor..."
          RELEASE_URL="https://github.com/Azure/apiops/releases/download/${{ env.apiops_release_version }}/extractor-linux-x64.zip"
          curl -sL "$RELEASE_URL" -o /tmp/extractor.zip
          unzip -oq /tmp/extractor.zip -d /tmp/extractor
          chmod +x /tmp/extractor/extractor
          echo "Running extractor..."
          /tmp/extractor/extractor

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "APIM Extract: ${{ github.event.inputs.environment }} - ${{ github.run_id }}"
          commit-message: "chore: extract APIM config from ${{ github.event.inputs.environment }}"
          branch: extract/${{ github.event.inputs.environment }}-${{ github.run_number }}
          body: |
            Automated extraction of APIM configuration from **${{ github.event.inputs.environment }}** environment.

            **Source**: `${{ secrets.API_MANAGEMENT_SERVICE_NAME }}`
            **Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Review the changes and merge to update the APIOps artifacts.
